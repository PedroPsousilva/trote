<!doctype html>
<html lang="pt-br">

<head>
    <title>Trote Solidário</title>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <nav class="menu">
        <!-- Menu de navegação -->
        <div class="menu-container">
            <a href="index.html" class="menu-logo"> Trote 2026 </a>
            <ul class="lista">
                <li><a href="index.html"> Início </a></li>
                <li><a href="formato.html"> Formato </a></li>
                <li><a href="equipes.html"> Equipes </a></li>
                <li><a href="provas.html"> Provas e Metas </a></li>
                <li><a href="integracao.html"> Integração </a></li>
                <li><a href="cronograma.html"> Cronograma </a></li>
                <li><a href="calculadora.html"> Calculadora </a></li>
            </ul>
        </div>
    </nav>
    <main class="pricipal">
        <section class="calculadora">
            <h3> Simulador de Pontos</h3>
            <div class="form-grid">
                <div class="form-group">
                    <label>Arroz (5kg) - 10 pts</label><!--rótulo da caixa de entrada-->
                    <input type="number" id="qtdeArroz" min="0"><!-- caixa de entrada-->
                </div>
                <div class="form-group">
                    <label>Feijão (2kg) - 8 pts</label>
                    <input type="number" id="qtdeFeijao" min="0">
                </div>
                <div class="form-group">
                    <label>Óleo (1und) - 8 pts</label>
                    <input type="number" id="qtdArrozdeFeijao" min="0">
                </div>
            </div>
            <button onclick="calcular()"> Calcular Total da Equipe</button>
            <div id="resultado" class="resultado-box">
                Pontuação total: 0 pontos
            </div>
        </section>

    </main>
    <footer>
        <p>Coordenação Trote Solidário 2026: trotesolidario@facef.br</p>
        <p>Uni-FACEF - Centro Universitario Municipal de Franca</p>
    </footer>
    <script><!--Programar em JavaScirpt-->
    function calcular(){
        //JS é uma linguagemnão tipada(sem tipo de dados)
        //Number() é uma função que converte texto em numero
        //Recupera o valor informado no elemento com id qtdeArroz
        let qtdeArroz =Number(document.getElementById("qtdeArroz").value)
        //Recupera o valor informado no elemento com id qtdeArroz
        let qtdeFeijao =Number( document.getElementById("qtdeFeijao").value)
        //calcula o valor total de pontos
        let pontos = (qtdeArroz * 10) + (qtdeFeijao * 8)
        //Vamos exibir o resultado para o usuario
        document.getElementById("resultado").innerText ="Pontuação Total: " +  pontos
    }

    </script>
</body>

</html>
