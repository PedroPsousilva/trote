<html lang="pt-br">

<head>
    <title>Trote Solidário</title>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <script src="script.js"></script>
</head>

<body>
    <nav class="menu">
        <!-- Menu de navegação -->
        <div class="menu-container">
            <a href="index.html" class="menu-logo"> Trote 2026 </a>
            <ul class="lista">
                <li><a href="index.html"> Início </a></li>
                <li><a href="formato.html"> Formato </a></li>
                <li><a href="equipes.html"> Equipes </a></li>
                <li><a href="provas.html"> Provas e Metas </a></li>
                <li><a href="integracao.html"> Integração </a></li>
                <li><a href="cronograma.html"> Cronograma </a></li>
                <li><a href="calculadora.html"> Calculadora </a></li>
            </ul>
        </div>
    </nav>
    <main class="pricipal">
        <section>
            <h3> SIMULADOR DE METAS BATIDAS</h3>
            <div>
                <div class="form-group">
                    <label>Kit Alimentação(60 kits)</label>
                    <input type="number" id="kitAlimentacao" min="0">

                </div>
                <div class="form-group">
                    <label>Suplementos (30 latas)</label>
                    <input type="number" id="qtdeLatas" min="0">

                </div>
                 <div class="form-group">
                    <label>Leite (60 caixas)</label>
                    <input type="number" id="qtdeLeites" min="0">

                </div>
                <div class="form-group">
                    <label>Doação de sangue (30 doações)</label>
                    <input type="number" id="qtdeDoacoes" min="0">

                </div>
                
            </div>
        </section>
        <section class="calculadora">
            <h3> Simulador de Pontos</h3>
            <div class="form-grid">
                <div class="form-group">
                    <label>Arroz (5kg) - 10 pts</label><!--rótulo da caixa de entrada-->
                    <input type="number" id="qtdeArroz" min="0"><!-- caixa de entrada-->
                </div>
                <div class="form-group">
                    <label>Feijão (2kg) - 8 pts</label>
                    <input type="number" id="qtdeFeijao" min="0">
                </div>
                <div class="form-group">
                    <label>Óleo (1und) - 4 pts</label>
                    <input type="number" id="qtdeOleo" min="0">
                </div>
                <div class="form-group">
                    <label>Macarrão (1und) - 2 pts</label>
                    <input type="number" id="qtdeMacarrao" min="0">
                </div>
            </div>
            
        </section>
        <section>
            <button onclick="calcular()"> Calcular Total da Equipe</button>
            <div id="resultado" class="resultado-box">
                Pontuação total: 0 pontos
            </div>
        </section>
    </main>
    <footer>
        <p>Coordenação Trote Solidário 2026: trotesolidario@facef.br</p>
        <p>Uni-FACEF - Centro Universitario Municipal de Franca</p>
    </footer>

    </script>
</body>

</html>
